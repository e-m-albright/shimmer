# =============================================================================
# Lefthook Configuration
# =============================================================================
# Git hooks powered by Lefthook (https://github.com/evilmartians/lefthook)
# Skip hooks: LEFTHOOK=0 git commit ...
# =============================================================================

parallel: true

pre-commit:
  parallel: true
  commands:
    # Check Rust formatting (all workspace crates)
    fmt:
      glob: "{shimmer-core,shimmer-server,src-tauri}/**/*.rs"
      run: cargo fmt --all -- --check

    # Lint all Rust crates
    clippy:
      glob: "{shimmer-core,shimmer-server,src-tauri}/**/*.rs"
      run: cargo clippy --workspace -- -D warnings

    # Check frontend types
    ui-check:
      glob: "src/**/*.{ts,svelte}"
      run: npm run check

pre-push:
  parallel: false
  commands:
    # Run all Rust tests
    test:
      run: cargo test --workspace

skip_output:
  - meta
  - summary
